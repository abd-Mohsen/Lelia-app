name: lelia
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  get: ^4.6.6
  get_storage: ^2.1.1
  geolocator: ^7.6.0
  flutter_osm_plugin: ^0.60.0
  jiffy: ^5.0.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  image_picker: ^1.0.4
  path: ^1.8.2
  path_provider: ^2.0.11
  dotted_border: ^2.1.0
  photo_view: ^0.14.0
  permission_handler: ^10.4.5
  otp_text_field: ^1.1.3
  timer_count_down: ^2.2.2
  http: any
  dropdown_search: ^5.0.6
  flutter_spinkit: ^5.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0



flutter:

  uses-material-design: true


  assets:
    - assets/images/
  fonts:
    - family: Alexandria
      fonts:
        - asset: assets/fonts/Alexandria-VariableFont_wght.ttf




